name: Android Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build_and_release:
    name: Build Signed Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Cancel previous runs
        uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Decode signing keystore
        run: |
          mkdir -p signing
          echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > signing/ryzix.p12
          echo "Keystore decoded ($(wc -c < signing/ryzix.p12) bytes)"

      - name: Compute version
        id: version
        run: |
          PATCH=${{ github.run_number }}
          VERSION="9.0.${PATCH}"
          SLUG=$(echo "$VERSION" | tr '.' '-')
          APK_NAME="RD-Code-v${SLUG}.apk"
          echo "code=${PATCH}"      >> $GITHUB_OUTPUT
          echo "name=${VERSION}"    >> $GITHUB_OUTPUT
          echo "slug=${SLUG}"       >> $GITHUB_OUTPUT
          echo "apk_name=${APK_NAME}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION} (code: ${PATCH})"

      - name: Build release APK
        env:
          SIGNING_STORE_FILE: ${{ github.workspace }}/signing/ryzix.p12
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace \
            -PversionCode=${{ steps.version.outputs.code }} \
            -PversionName=${{ steps.version.outputs.name }}

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             "app/build/outputs/apk/release/${{ steps.version.outputs.apk_name }}"
          echo "Renamed APK to: ${{ steps.version.outputs.apk_name }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}
          name: "RD-Code v${{ steps.version.outputs.name }} (Build #${{ github.run_number }})"
          body: |
            ## RD-Code v${{ steps.version.outputs.name }}

            **Signed release build** — install and update without uninstalling.

            | Field | Value |
            |-------|-------|
            | APK | `${{ steps.version.outputs.apk_name }}` |
            | Branch | `${{ github.ref_name }}` |
            | Commit | `${{ github.sha }}` |
            | Build | #${{ github.run_number }} |

            ### What's new in v${{ steps.version.outputs.name }}
            - Sora code editor with line numbers and dark theme
            - HTML preview server (tap ▶ to run, opens WebView)
            - Parser fix: FILE_EDIT blocks no longer leak as raw text
            - Stronger AI system prompt — no more full-file rewrites
            - New premium file icons (HTML, CSS, JS, TS, Python)
            - APK version auto-bumps on every build

            > Install: download the APK, allow unknown sources, tap to install.
            > Updates: just install over the existing version — same signing key every build.
          draft: false
          prerelease: false
          files: app/build/outputs/apk/release/${{ steps.version.outputs.apk_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
