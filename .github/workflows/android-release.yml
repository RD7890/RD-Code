name: Android Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build_and_release:
    name: Build Signed Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Cancel previous runs
        uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Decode signing keystore
        run: |
          mkdir -p signing
          echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > signing/ryzix.p12
          echo "Keystore decoded ($(wc -c < signing/ryzix.p12) bytes)"

      - name: Build release APK
        env:
          SIGNING_STORE_FILE: ${{ github.workspace }}/signing/ryzix.p12
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep versionName app/build.gradle | grep -o '"[0-9.]*"' | tr -d '"' | head -1)
          echo "name=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}-build.${{ github.run_number }}
          name: "Ryzix Code v${{ steps.version.outputs.name }} (Build #${{ github.run_number }})"
          body: |
            ## Ryzix Code v${{ steps.version.outputs.name }}

            **Signed release build** — install and update without uninstalling.

            | Field | Value |
            |-------|-------|
            | Branch | `${{ github.ref_name }}` |
            | Commit | `${{ github.sha }}` |
            | Build | #${{ github.run_number }} |

            > Install: download the APK, allow unknown sources, tap to install.
            > Updates: just install over the existing version — same signing key every build.
          draft: false
          prerelease: false
          files: app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
